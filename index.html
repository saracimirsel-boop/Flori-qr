<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria e Florit</title>
    <style>
        body { margin: 0; padding: 20px; background: #000; color: white; font-family: sans-serif; text-align: center; }
        .container { max-width: 600px; margin: auto; display: flex; flex-direction: column; gap: 15px; }
        img, video { width: 100%; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h1>Galeria e Florit</h1>
    <div class="container">
        <video id="v" controls autoplay muted loop playsinline src="video.mp4" onloadeddata="this.style.display='block'"></video>
        
        <img src="foto.jpg" onload="this.style.display='block'">
        <img src="foto1.jpg" onload="this.style.display='block'">
        <img src="foto2.jpg" onload="this.style.display='block'">
        <img src="foto3.jpg" onload="this.style.display='block'">
        <img src="foto4.jpg" onload="this.style.display='block'">
        <img src="foto5.jpg" onload="this.style.display='block'">
    </div>
</body>
</html>

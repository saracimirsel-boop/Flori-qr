<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flori Saraci</title>
    <style>
        /* Ky rregull fsheh çdo gjë tjetër dhe mban vetëm fotot/videot */
        body, html { 
            margin: 0; 
            padding: 0; 
            background: #000; 
            width: 100%; 
            overflow-x: hidden;
            color: white;
        }
        .content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
        }
        img, video {
            width: 100%;
            height: auto;
            display: block;
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="content">
        <video id="v" controls autoplay muted loop playsinline style="display:none;">
            <source src="video.mp4" type="video/mp4">
        </video>

        <img src="foto.jpg" onerror="this.style.display='none'">
        <img src="foto2.jpg" onerror="this.style.display='none'">
        <img src="foto3.jpg" onerror="this.style.display='none'">
    </div>

    <script>
        var vid = document.getElementById('v');
        vid.addEventListener('loadeddata', function() {
            vid.style.display = 'block';
        }, false);
    </script>
</body>
</html>

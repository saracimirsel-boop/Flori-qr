<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flori Saraci</title>
    <style>
        body { margin: 0; padding: 0; background: #000; text-align: center; color: white; }
        video, img { width: 100%; height: auto; display: block; margin-bottom: 2px; }
        .container { display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div class="container">
        <video id="vid" controls autoplay muted loop playsinline style="display:none;">
            <source src="video.mp4" type="video/mp4">
        </video>

        <img src="foto.jpg" onerror="this.style.display='none'">
        <img src="foto2.jpg" onerror="this.style.display='none'">
        <img src="foto3.jpg" onerror="this.style.display='none'">
    </div>

    <script>
        // Ky kod kontrollon nëse videoja ekziston dhe e shfaq atë
        var v = document.getElementById('vid');
        v.addEventListener('loadeddata', function() {
            v.style.display = 'block';
        }, false);
    </script>
</body>
</html>
